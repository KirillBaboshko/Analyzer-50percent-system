services:
  # Backend Service (Go)
  - type: web
    name: dota-analyzer-backend
    env: go
    region: frankfurt
    plan: free
    buildCommand: cd dota-analyzer && go build -o ../bin/analyzer cmd/main.go
    startCommand: ./bin/analyzer
    envVars:
      - key: PORT
        value: 8080
      - key: STRATZ_API_TOKEN
        sync: false
    healthCheckPath: /health

  # Frontend Service (React)
  - type: web
    name: dota-analyzer-frontend
    env: node
    region: frankfurt
    plan: free
    buildCommand: cd dota-analyzer-frontend && npm install && npm run build
    staticPublishPath: ./dota-analyzer-frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: dota-analyzer-backend
          envVarKey: RENDER_EXTERNAL_URL
