services:
  # Backend Service (Go)
  - type: web
    name: dota-analyzer-backend
    env: go
    region: frankfurt
    plan: free
    buildCommand: cd dota-analyzer && go build -o ../bin/analyzer cmd/main.go
    startCommand: ./bin/analyzer
    envVars:
      - key: PORT
        value: 8080
      - key: STRATZ_API_TOKEN
        sync: false
    healthCheckPath: /health

  # Frontend Static Site (React)
  - type: web
    name: dota-analyzer-frontend
    env: static
    buildCommand: cd dota-analyzer-frontend && npm install && VITE_API_URL=https://dota-analyzer-backend.onrender.com/api npm run build
    staticPublishPath: ./dota-analyzer-frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
